
services:
  studentsapi:
    build:
      context: ./studentsapi
      dockerfile: Dockerfile
    container_name: students-api
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m -javaagent:/app/opentelemetry-javaagent.jar"
      SPRING_PROFILES_ACTIVE: "local"
      OTEL_SERVICE_NAME: "students-api"
      OTEL_TRACES_EXPORTER: "zipkin"
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: "http://zipkin:9411/api/v2/spans"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
    restart: unless-stopped
    depends_on:
      - zipkin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/students/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - studentsapi-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped
    networks:
      - studentsapi-network

networks:
  studentsapi-network:
    driver: bridge
