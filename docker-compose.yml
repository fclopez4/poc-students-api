
services:
  studentsapi:
    build:
      context: ./studentsapi
      dockerfile: Dockerfile
    container_name: students-api
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      SPRING_PROFILES_ACTIVE: "default"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/students/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - studentsapi-network
networks:
  studentsapi-network:
    driver: bridge
